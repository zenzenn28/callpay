<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Talent Portal — CallPay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="talent.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#E8628A">
</head>
<body>

<!-- ══ LOGIN ════════════════════════════════════════════════ -->
<div class="login-page" id="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-logo">CallPay</div>
      <div class="login-sub">Talent Portal</div>
    </div>
    <div class="login-field">
      <label>Username</label>
      <input type="text" id="t-user" placeholder="Username kamu" autocomplete="username">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="t-pass" placeholder="Password kamu" autocomplete="current-password">
    </div>
    <p class="login-err" id="t-err"></p>
    <button class="login-submit" id="t-login-btn">Masuk</button>
    <p class="login-hint">
      <a href="index.html" style="color:var(--pink)">← Kembali ke website</a>
    </p>
  </div>
</div>

<!-- ══ DASHBOARD ═════════════════════════════════════════════ -->
<div class="dashboard" id="dashboard">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-logo">CallPay</div>
    <div class="topbar-user">
      <div class="talent-avatar" id="t-avatar">N</div>
      <div class="talent-name-top" id="t-name-top">Talent</div>
      <button class="logout-btn-top" id="t-logout-btn">Logout</button>
    </div>
  </div>

  <!-- Content -->
  <div class="dash-content">

    <div id="status-banner"></div>

    <!-- Point Box -->
    <div id="talent-point-box"></div>

    <!-- Status bar -->
    <div class="status-bar">
      <div class="status-dot online" id="status-dot"></div>
      <div class="status-text" id="status-text">Memuat status...</div>
      <button class="status-toggle active" id="status-toggle">Set Offline</button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" id="tab-orders">📋 Orderanku</button>
      <button class="tab-btn" id="tab-settings">⚙️ Setting</button>
    </div>

    <!-- Orderanku -->
    <div id="orders-section">
      <div id="my-orders-list">
        <div class="empty"><div class="empty-icon">⏳</div><p>Memuat orderan...</p></div>
      </div>
    </div>

    <!-- Setting Profil -->
    <div id="settings-section" style="display:none">
      <div id="settings-content"></div>
    </div>

  </div>
</div>

<!-- ══ SETUP PAGE (first time / rejected) ══════════════════ -->
<div id="setup-page" style="display:none;min-height:100vh;background:var(--bg);padding:20px">
  <div style="max-width:520px;margin:0 auto;padding-top:20px">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
      <div style="font-family:'Pacifico',cursive;font-size:1.2rem;color:var(--pink)">CallPay</div>
    </div>
    <div id="setup-content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="talent-app.js"></script>
</body>
</html>
