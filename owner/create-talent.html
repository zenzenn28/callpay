<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Buat Akun Talent — CallPay Owner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
  <style>
    .form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:28px 32px;max-width:480px}
    .form-row{margin-bottom:18px}
    .form-row label{display:block;font-size:.73rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px}
    .form-row input,.form-row select{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-size:.9rem;font-weight:600;outline:none;transition:border-color .2s;font-family:'Nunito',sans-serif}
    .form-row input:focus,.form-row select:focus{border-color:var(--pink)}
    .form-row select option{background:var(--surface2)}
    .form-hint{font-size:.75rem;color:var(--muted);font-weight:600;margin-top:5px}
    .account-list{margin-top:32px}
    .account-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;gap:12px;flex-wrap:wrap}
    .acc-name{font-weight:800;font-size:.92rem}
    .acc-user{font-size:.78rem;color:var(--muted);font-weight:600;margin-top:2px}
    .acc-actions{display:flex;gap:8px}
    .btn-danger{background:rgba(255,92,92,.1);color:var(--red);border:1px solid rgba(255,92,92,.25);padding:5px 14px;border-radius:99px;font-size:.75rem;font-weight:800;cursor:pointer;transition:all .2s}
    .btn-danger:hover{background:rgba(255,92,92,.2)}
    .badge-gender{display:inline-block;padding:2px 10px;border-radius:99px;font-size:.7rem;font-weight:800}
    .bg-f{background:rgba(249,168,201,.1);color:var(--pink);border:1px solid var(--border-pk)}
    .bg-m{background:rgba(168,213,249,.1);color:var(--blue);border:1px solid var(--border-bl)}
  </style>
<script>
function toggleSidebar(){const sb=document.querySelector('.sidebar'),ov=document.getElementById('sidebar-overlay'),btn=document.getElementById('hamburger-btn');if(!sb||!ov||!btn)return;const open=sb.classList.toggle('open');ov.classList.toggle('open',open);btn.textContent=open?'✕':'☰';}
function closeSidebar(){const sb=document.querySelector('.sidebar'),ov=document.getElementById('sidebar-overlay'),btn=document.getElementById('hamburger-btn');if(!sb||!ov||!btn)return;sb.classList.remove('open');ov.classList.remove('open');btn.textContent='☰';}
</script>
</head>
<body>
<div class="app">
  <div class="mobile-topbar"><span class="mobile-logo">CallPay</span><button class="hamburger" onclick="toggleSidebar()" id="hamburger-btn">☰</button></div>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <aside class="sidebar">
        <div class="sidebar-logo"><div class="sidebar-logo-text">CallPay</div><div class="sidebar-logo-sub">Owner Panel</div></div>
        <nav class="sidebar-nav">
      <a href="create-talent.html" class="nav-item active"><span class="nav-icon">➕</span>Buat Akun Talent</a>
      <a href="review.html"        class="nav-item "><span class="nav-icon">📋</span>Review Talent</a>
      <a href="settings.html"      class="nav-item "><span class="nav-icon">⚙️</span>Pengaturan</a>
      <a href="../index.html"      class="nav-item" id="back-web"><span class="nav-icon">🌐</span>Lihat Website</a>
    </nav>
    <div class="sidebar-footer"><button class="logout-btn" id="logout-btn">Logout →</button></div>
  </aside>
  <main class="main">
    <div class="page-header">
      <h1>Buat Akun Talent ➕</h1>
      <p>Buat username & password untuk talent baru</p>
    </div>

    <div class="form-card">
      <div class="form-row">
        <label>Nama Talent *</label>
        <input type="text" id="f-name" placeholder="Contoh: Nadia">
        <div class="form-hint">Nama akan jadi username (huruf kecil, tanpa spasi)</div>
      </div>
      <div class="form-row">
        <label>Password *</label>
        <input type="text" id="f-pass" placeholder="Buat password">
      </div>
      <div class="form-row">
        <label>Gender *</label>
        <select id="f-gender">
          <option value="">— Pilih Gender —</option>
          <option value="female">Wanita</option>
          <option value="male">Pria</option>
        </select>
      </div>
      <div class="form-row">
        <label>Umur *</label>
        <input type="number" id="f-age" placeholder="Contoh: 21" min="18" max="35">
      </div>
      <p id="form-err" style="color:var(--red);font-size:.82rem;font-weight:700;display:none;margin-bottom:12px"></p>
      <button class="btn btn-pink" id="create-btn" style="width:100%">Buat Akun Talent</button>
    </div>

    <div class="account-list">
      <h3 style="font-size:1rem;font-weight:900;margin-bottom:14px;color:var(--muted)">Akun Talent Terdaftar</h3>
      <div id="accounts-list"><p style="color:var(--muted);font-size:.85rem">Memuat data...</p></div>
    </div>
  </main>
</div>

<script type="module">
import { DB, requireOwner } from '../admin/data.js';
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, deleteDoc } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';

const FIREBASE_CONFIG = {
  apiKey:'AIzaSyBLPe_yx28LyefI856Ysxz3YEPnwA0ENFU',
  authDomain:'callpay-28a28.firebaseapp.com',
  projectId:'callpay-28a28',
  storageBucket:'callpay-28a28.firebasestorage.app',
  messagingSenderId:'44722427776',
  appId:'1:44722427776:web:29d1a297746cd83d685365'
};
const _app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_CONFIG);
const _db  = getFirestore(_app);

document.getElementById('logout-btn').onclick = () => { sessionStorage.removeItem('cp_owner'); window.location.href = 'index.html'; };
document.getElementById('back-web').onclick   = () => { if(confirm('Logout dari admin?')){ sessionStorage.removeItem('cp_owner'); window.location.href='../index.html'; } return false; };

// Auto-generate username dari nama
document.getElementById('f-name').addEventListener('input', function() {
  this.value = this.value.replace(/\s+/g, '');
});

document.getElementById('create-btn').onclick = async () => {
  const name     = document.getElementById('f-name').value.trim();
  const password = document.getElementById('f-pass').value.trim();
  const gender   = document.getElementById('f-gender').value;
  const age      = parseInt(document.getElementById('f-age').value);
  const errEl    = document.getElementById('form-err');
  errEl.style.display = 'none';

  if (!name || !password || !gender || !age) {
    errEl.textContent = 'Semua field wajib diisi.';
    errEl.style.display = 'block'; return;
  }
  if (age < 18 || age > 35) {
    errEl.textContent = 'Umur harus antara 18–35 tahun.';
    errEl.style.display = 'block'; return;
  }

  const docId = name.toLowerCase();
  const btn   = document.getElementById('create-btn');
  btn.disabled = true; btn.textContent = 'Membuat...';

  try {
    // Cek apakah sudah ada
    const existing = await getDoc(doc(_db, 'talents', docId));
    if (existing.exists()) {
      errEl.textContent = `Akun "${docId}" sudah ada!`;
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Buat Akun Talent'; return;
    }
    // Buat dokumen talent baru dengan status draft
    await setDoc(doc(_db, 'talents', docId), {
      username : docId,
      password : password,
      name     : name,
      gender   : gender,
      age      : age,
      online   : false,
      active   : false,
      status   : 'draft', // draft = baru dibuat, belum setup
      img      : '',
      audio    : '',
      services : [],
      createdAt: new Date().toISOString(),
    });
    // Reset form
    document.getElementById('f-name').value = '';
    document.getElementById('f-pass').value = '';
    document.getElementById('f-gender').value = '';
    document.getElementById('f-age').value = '';
    alert(`✅ Akun talent "${name}" berhasil dibuat!\nUsername: ${docId}\nPassword: ${password}`);
  } catch(e) {
    errEl.textContent = 'Gagal: ' + e.message;
    errEl.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Buat Akun Talent';
};

// Hapus akun
window.deleteAccount = async (docId) => {
  if (!confirm(`Hapus akun talent "${docId}"? Data akan hilang permanen!`)) return;
  await deleteDoc(doc(_db, 'talents', docId));
};

// Realtime list akun
onSnapshot(collection(_db, 'talents'), snap => {
  const list = [];
  snap.forEach(d => list.push({ id: d.id, ...d.data() }));
  list.sort((a,b) => a.name?.localeCompare(b.name));

  if (!list.length) {
    document.getElementById('accounts-list').innerHTML = '<p style="color:var(--muted);font-size:.85rem">Belum ada akun talent.</p>';
    return;
  }
  document.getElementById('accounts-list').innerHTML = list.map(t => {
    const statusColor = t.status === 'approved' ? 'var(--green)' : t.status === 'pending' ? 'var(--yellow)' : t.status === 'rejected' ? 'var(--red)' : 'var(--muted)';
    const statusLabel = t.status === 'approved' ? '✅ Aktif' : t.status === 'pending' ? '⏳ Review' : t.status === 'rejected' ? '❌ Ditolak' : '📝 Draft';
    return `
    <div class="account-row">
      <div style="display:flex;align-items:center;gap:12px;flex:1">
        ${t.img ? `<img src="${t.img}" style="width:40px;height:40px;border-radius:8px;object-fit:cover">` : `<div style="width:40px;height:40px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1.1rem">👤</div>`}
        <div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="acc-name">${t.name || t.id}</span>
            <span class="badge-gender ${t.gender==='female'?'bg-f':'bg-m'}">${t.gender==='female'?'Wanita':'Pria'}</span>
          </div>
          <div class="acc-user">@${t.id} · ${t.age||'-'} thn · <span style="color:${statusColor};font-weight:800">${statusLabel}</span></div>
        </div>
      </div>
      <div class="acc-actions">
        <button class="btn-danger" onclick="deleteAccount('${t.id}')">Hapus</button>
      </div>
    </div>`;
  }).join('');
});

document.addEventListener('DOMContentLoaded', async () => {
  if (!DB.isLoggedIn()) { window.location.href = 'index.html'; return; }
    // ── SIDEBAR ROLE ─────────────────────────────────────────
  (function applySidebarRole() {
    if (!DB.isOwner()) {
      ["nav-orders","nav-assign","nav-create","nav-review","nav-settings","nav-dashboard"].forEach(id=>{
        const el = document.getElementById(id); if(el) el.style.display="none";
      });
    }
    const lbl = document.getElementById("sidebar-role-label");
    if (lbl) lbl.textContent = DB.isOwner() ? "Owner Panel" : "Owner Panel";
  })();
  document.querySelectorAll('.nav-item').forEach(a => a.addEventListener('click', () => { if(window.innerWidth<=768) closeSidebar(); }));
});
</script>
</body>
</html>
