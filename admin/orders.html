<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Order — CallPay Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
<script>
function toggleSidebar(){const sb=document.querySelector('.sidebar'),ov=document.getElementById('sidebar-overlay'),btn=document.getElementById('hamburger-btn');if(!sb||!ov||!btn)return;const open=sb.classList.toggle('open');ov.classList.toggle('open',open);btn.textContent=open?'✕':'☰';}
function closeSidebar(){const sb=document.querySelector('.sidebar'),ov=document.getElementById('sidebar-overlay'),btn=document.getElementById('hamburger-btn');if(!sb||!ov||!btn)return;sb.classList.remove('open');ov.classList.remove('open');btn.textContent='☰';}
</script>
</head>
<body>
<div class="app">
  <div class="mobile-topbar"><span class="mobile-logo">CallPay</span><button class="hamburger" onclick="toggleSidebar()" id="hamburger-btn">☰</button></div>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="sidebar-logo-text">CallPay</div><div class="sidebar-logo-sub">Admin Panel</div></div>
    <nav class="sidebar-nav">
      <a href="index.html"      class="nav-item"><span class="nav-icon">📊</span>Dashboard</a>
      <a href="orders.html"     class="nav-item active"><span class="nav-icon">📦</span>Order</a>
      <a href="unassigned.html" class="nav-item"><span class="nav-icon">🎯</span>Assign Talent</a>
      <a href="talents.html"    class="nav-item"><span class="nav-icon">👥</span>Talent</a>
      <a href="settings.html"   class="nav-item"><span class="nav-icon">⚙️</span>Pengaturan</a>
      <a href="../index.html"   class="nav-item" id="back-web"><span class="nav-icon">🌐</span>Lihat Website</a>
    </nav>
    <div class="sidebar-footer"><button class="logout-btn" id="logout-btn">Logout →</button></div>
  </aside>
  <main class="main">
    <div class="ph-flex page-header">
      <div><h1>Order 📦</h1><p>Kelola semua orderan dari pelanggan</p></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px">
        <select id="filter-status" style="padding:8px 14px;border-radius:99px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:.83rem;font-family:'Nunito',sans-serif">
          <option value="">Semua Status</option>
          <option value="baru">Baru</option><option value="proses">Proses</option>
          <option value="selesai">Selesai</option><option value="batal">Batal</option>
        </select>
        <input type="text" id="search" placeholder="Cari nama / talent..." style="padding:8px 14px;border-radius:99px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:.83rem;font-family:'Nunito',sans-serif;outline:none;width:200px">
      </div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px" id="badges"></div>
    <div class="panel">
      <div class="table-wrap">
        <table><thead><tr><th>#</th><th>Talent</th><th>Layanan</th><th>Durasi</th><th>Harga</th><th>Status</th><th>Sisa</th><th>Tgl</th><th>Aksi</th></tr></thead>
        <tbody id="orders-tbody"></tbody></table>
        <div class="empty" id="empty" style="display:none"><div class="empty-icon">📭</div><p>Tidak ada order</p></div>
      </div>
    </div>
  </main>
</div>

<div class="modal-bg" id="del-modal">
  <div class="modal-box">
    <div class="modal-title">🗑️ Hapus Order?</div>
    <div class="modal-desc">Order ini akan dihapus permanen.</div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="del-cancel">Batal</button>
      <button class="btn btn-red" id="del-confirm">Hapus</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { DB, DUR_LABEL } from './data.js';

let allOrders=[], deleteId=null;

document.getElementById('logout-btn').onclick=()=>{DB.setLogin(false);window.location.href='index.html';};
document.getElementById('back-web').onclick=()=>{if(confirm('Logout dari admin?')){DB.setLogin(false);window.location.href='../index.html';}return false;};
document.getElementById('filter-status').onchange=()=>render(allOrders);
document.getElementById('search').oninput=()=>render(allOrders);
document.getElementById('del-cancel').onclick=()=>{document.getElementById('del-modal').classList.remove('open');deleteId=null;};
document.getElementById('del-confirm').onclick=async()=>{
  if(!deleteId)return;
  await DB.deleteOrder(deleteId);
  document.getElementById('del-modal').classList.remove('open');
  deleteId=null; toast('Order dihapus 🗑️');
};

function render(orders){
  allOrders=orders;
  const fs=document.getElementById('filter-status').value;
  const sq=document.getElementById('search').value.toLowerCase();
  const counts={baru:0,proses:0,selesai:0,batal:0};
  orders.forEach(o=>{if(counts[o.status]!==undefined)counts[o.status]++;});
  document.getElementById('badges').innerHTML=[
    {k:'baru',l:'Baru',c:'badge-baru'},{k:'proses',l:'Proses',c:'badge-proses'},
    {k:'selesai',l:'Selesai',c:'badge-selesai'},{k:'batal',l:'Batal',c:'badge-batal'},
  ].map(b=>`<span class="badge ${b.c}" style="font-size:.8rem;padding:5px 14px">${b.l}: ${counts[b.k]}</span>`).join('');

  let filtered=orders;
  if(fs) filtered=filtered.filter(o=>o.status===fs);
  if(sq) filtered=filtered.filter(o=>(o.customerName||'').toLowerCase().includes(sq)||(o.talentName||'').toLowerCase().includes(sq)||(o.service||'').toLowerCase().includes(sq));

  const tbody=document.getElementById('orders-tbody'),empty=document.getElementById('empty');
  if(!filtered.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  tbody.innerHTML=filtered.map(o=>{
    const rem=DB.timeRemaining(o);
    const rc=o.status==='selesai'?'var(--green)':o.status==='proses'?'var(--yellow)':o.status==='batal'?'var(--muted)':'var(--blue-mid)';
    const isActive=['baru','proses'].includes(o.status);
    return `<tr>
      <td style="color:var(--muted);font-size:.72rem;font-family:monospace">${(o.id||'').slice(-8)}</td>
      <td>${o.talentName||'<i style="color:var(--muted)">Unassigned</i>'}</td>
      <td>${o.service||'-'}</td>
      <td>${DUR_LABEL[o.duration]||(o.duration+' mnt')}</td>
      <td style="font-weight:800;color:var(--pink)">${DB.formatRp(o.price||0)}</td>
      <td><span class="badge badge-${o.status}">${o.status}</span></td>
      <td style="font-size:.78rem;font-weight:700;color:${rc}">${rem}</td>
      <td style="color:var(--muted);font-size:.78rem">${DB.formatDate(o.date)}</td>
      <td style="display:flex;gap:6px;align-items:center">
        <select data-id="${o.id}" class="status-sel" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:4px 8px;font-size:.75rem;font-family:'Nunito',sans-serif;cursor:pointer">
          ${['baru','proses','selesai','batal'].map(s=>`<option value="${s}"${o.status===s?' selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
        </select>
        <button class="btn btn-icon btn-red" onclick="openDel('${o.id}')">🗑️</button>
      </td>
    </tr>`;
  }).join('');
}

window.changeStatus=async(id,status)=>{
  const order = allOrders.find(o => o.id === id);
  if (!order) { toast('❌ Order tidak ditemukan'); return; }
  try {
    if (order._docId) {
      await DB.updateByDocId(order._docId, status);
    } else {
      await DB.updateOrderStatus(id, status);
    }
    // Langsung update local state — jangan tunggu Firestore listener
    order.status = status;
    if (status === 'proses') order.prosesAt = new Date().toISOString();
    render(allOrders);
    toast('Status diperbarui ✅');
  } catch(e) {
    console.error('changeStatus error:', e);
    toast('❌ Gagal update status');
  }
};
window.openDel=(id)=>{ deleteId=id; document.getElementById('del-modal').classList.add('open'); };

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

document.addEventListener('DOMContentLoaded',async()=>{
  if(!DB.isLoggedIn()){window.location.href='index.html';return;}
  await DB.getSettingsAsync();
  // Realtime
  DB.onOrdersChange(orders => render(orders));
  // Auto selesai kalau timer proses habis (cek tiap 1 menit)
  setInterval(async()=>{
    const orders = await DB.getOrders();
    for (const o of orders) {
      if (o.status==='proses' && o.prosesAt && o._docId) {
        const elapsed = Date.now() - new Date(o.prosesAt).getTime();
        const durMs   = (Number(o.duration)||60)*60*1000;
        if (elapsed >= durMs) await DB.updateByDocId(o._docId,'selesai');
      }
    }
  }, 60000);
  document.querySelectorAll('.nav-item').forEach(a=>a.addEventListener('click',()=>{if(window.innerWidth<=768)closeSidebar();}));

  // Event delegation — lebih reliable dari inline onchange
  document.getElementById('orders-tbody').addEventListener('change', async(e)=>{
    const sel = e.target.closest('.status-sel');
    if (!sel) return;
    const id     = sel.dataset.id;
    const status = sel.value;
    await changeStatus(id, status);
  });
});
</script>
</body>
</html>
