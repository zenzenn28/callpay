<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Assign Talent — CallPay Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
<script>
function toggleSidebar(){const sb=document.querySelector('.sidebar'),ov=document.getElementById('sidebar-overlay'),btn=document.getElementById('hamburger-btn');if(!sb||!ov||!btn)return;const open=sb.classList.toggle('open');ov.classList.toggle('open',open);btn.textContent=open?'✕':'☰';}
function closeSidebar(){const sb=document.querySelector('.sidebar'),ov=document.getElementById('sidebar-overlay'),btn=document.getElementById('hamburger-btn');if(!sb||!ov||!btn)return;sb.classList.remove('open');ov.classList.remove('open');btn.textContent='☰';}
</script>
</head>
<body>
<div class="app">
  <div class="mobile-topbar"><span class="mobile-logo">CallPay</span><button class="hamburger" onclick="toggleSidebar()" id="hamburger-btn">☰</button></div>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="sidebar-logo-text">CallPay</div><div class="sidebar-logo-sub">Admin Panel</div></div>
    <nav class="sidebar-nav">
      <a href="index.html"      class="nav-item"><span class="nav-icon">📊</span>Dashboard</a>
      <a href="orders.html"     class="nav-item"><span class="nav-icon">📦</span>Order</a>
      <a href="unassigned.html" class="nav-item active"><span class="nav-icon">🎯</span>Assign Talent</a>
      <a href="talents.html"    class="nav-item"><span class="nav-icon">👥</span>Talent</a>
      <a href="settings.html"   class="nav-item"><span class="nav-icon">⚙️</span>Pengaturan</a>
      <a href="../index.html"   class="nav-item" id="back-web"><span class="nav-icon">🌐</span>Lihat Website</a>
    </nav>
    <div class="sidebar-footer"><button class="logout-btn" id="logout-btn">Logout →</button></div>
  </aside>
  <main class="main">
    <div class="page-header"><h1>Assign Talent 🎯</h1><p>Order masuk tanpa talent — pilihkan talent yang akan mengambil orderan ini</p></div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:22px" id="ua-summary"></div>
    <div id="ua-list"><p style="color:var(--muted)">Memuat data...</p></div>
  </main>
</div>

<div class="modal-bg" id="assign-modal">
  <div class="modal-box">
    <div class="modal-title">✅ Konfirmasi Assign Talent?</div>
    <div class="modal-desc" id="assign-desc">—</div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="assign-cancel">Batal</button>
      <button class="btn btn-pink" id="assign-confirm">Konfirmasi</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { DB, TALENTS, DUR_LABEL } from './data.js';

let pendingAssign=null;

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

document.getElementById('logout-btn').onclick=()=>{DB.setLogin(false);window.location.href='index.html';};
document.getElementById('back-web').onclick=()=>{if(confirm('Logout dari admin?')){DB.setLogin(false);window.location.href='../index.html';}return false;};
document.getElementById('assign-cancel').onclick=()=>{document.getElementById('assign-modal').classList.remove('open');pendingAssign=null;};
document.getElementById('assign-confirm').onclick=async()=>{
  if(!pendingAssign)return;
  const{orderId,talentId,talentName}=pendingAssign;
  await DB.assignTalent(orderId,talentId,talentName);
  document.getElementById('assign-modal').classList.remove('open');
  pendingAssign=null;
  toast(`✅ Order di-assign ke ${talentName}!`);
};

window.openAssignModal=(orderId,orders)=>{
  const sel=document.getElementById('sel-'+orderId);
  if(!sel||!sel.value){toast('❌ Pilih talent dulu!');return;}
  const[talentId,talentName]=sel.value.split('|');
  const order=orders.find(o=>o.id===orderId);
  pendingAssign={orderId,talentId:parseInt(talentId),talentName};
  document.getElementById('assign-desc').innerHTML=`Assign order <strong style="color:var(--pink)">#${orderId.slice(-8)}</strong> milik <strong>${order?.customerName||'-'}</strong> ke talent <strong style="color:var(--pink)">${talentName}</strong>?<br><br><span style="font-size:.82rem;color:var(--muted)">Setelah di-assign, orderan masuk ke rekap talent ini.</span>`;
  document.getElementById('assign-modal').classList.add('open');
};

window.deleteOrder=async(id)=>{
  if(confirm('Hapus order ini permanen?')){ await DB.deleteOrder(id); toast('🗑️ Order dihapus'); }
};

function render(orders){
  const unassigned=orders.filter(o=>!o.talentId&&!o.talentName);
  document.getElementById('ua-summary').innerHTML=`
    <span class="badge badge-baru" style="font-size:.8rem;padding:5px 14px">Belum di-assign: ${unassigned.length}</span>
    <span class="badge badge-selesai" style="font-size:.8rem;padding:5px 14px">Selesai: ${unassigned.filter(o=>o.status==='selesai').length}</span>`;

  const container=document.getElementById('ua-list');
  if(!unassigned.length){container.innerHTML=`<div class="empty"><div class="empty-icon">🎉</div><p>Semua order sudah di-assign!</p></div>`;return;}

  const talentOpts=TALENTS.map(t=>`<option value="${t.id}|${t.name}">${t.name} — ${t.gender==='female'?'🌸':'💙'} ${t.gender==='female'?'Wanita':'Pria'}</option>`).join('');

  container.innerHTML=unassigned.map(o=>{
    const gb=o.genderPref?`<span class="badge" style="background:rgba(249,168,201,.1);color:var(--pink);border:1px solid var(--border-pk)">Preferensi: ${o.genderPref==='female'?'🌸 Wanita':'💙 Pria'}</span>`:'';
    return `<div class="panel" style="margin-bottom:16px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px">
        <div>
          <div style="font-weight:900;font-size:1rem;margin-bottom:4px">Order <span style="font-size:.72rem;color:var(--muted);font-family:monospace">#${(o.id||'').slice(-8)}</span></div>
          <div style="font-size:.82rem;color:var(--muted);font-weight:600;margin-bottom:6px">📅 ${DB.formatDate(o.date)} · 💼 ${o.service||'-'} · ⏱ ${DUR_LABEL[o.duration]||(o.duration+' mnt')}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
            <span style="font-weight:800;color:var(--pink)">${DB.formatRp(o.price||0)}</span>
            <span class="badge badge-${o.status}">${o.status}</span>
            ${gb}
          </div>
          ${o.customerNote?`<div style="margin-top:8px;font-size:.8rem;color:var(--muted);font-style:italic">📝 ${o.customerNote}</div>`:''}
        </div>
      </div>
      <div style="display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;padding-top:14px;border-top:1px solid var(--border)">
        <div style="flex:1;min-width:180px">
          <label style="display:block;font-size:.7rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">Pilih Talent</label>
          <select id="sel-${o.id}" style="width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--r);font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:600;outline:none">
            <option value="">— Pilih Talent —</option>${talentOpts}
          </select>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-pink" onclick="openAssignModal('${o.id}',window._ua_orders)">✅ Assign</button>
          <button class="btn btn-red btn-sm" onclick="deleteOrder('${o.id}')">🗑️ Hapus</button>
        </div>
      </div>
    </div>`;
  }).join('');

  window._ua_orders=orders;
}

document.addEventListener('DOMContentLoaded',async()=>{
  if(!DB.isLoggedIn()){window.location.href='index.html';return;}
  await DB.getSettingsAsync();
  DB.onOrdersChange(orders=>render(orders));
  document.querySelectorAll('.nav-item').forEach(a=>a.addEventListener('click',()=>{if(window.innerWidth<=768)closeSidebar();}));
});
</script>
</body>
</html>
