<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cek Order — CallPay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink:#F9A8C9;--pink-mid:#E8628A;--pink-glow:rgba(232,98,138,.18);
      --blue:#A8D5F9;--blue-mid:#4DA6E8;--green:#3DD68C;--yellow:#FFB800;--red:#FF5C5C;
      --bg:#0D0D14;--surface:#1A1A2A;--surface2:#21213A;
      --border:rgba(255,255,255,.07);--border-pk:rgba(249,168,201,.22);
      --text:#F0EBF8;--muted:rgba(240,235,248,.45);
      --r:14px;--rl:22px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    a{text-decoration:none;color:inherit}
    button{cursor:pointer;font-family:'Nunito',sans-serif}

    /* Navbar */
    .navbar{
      position:fixed;top:0;left:0;right:0;z-index:100;
      height:62px;display:flex;align-items:center;justify-content:space-between;
      padding:0 24px;
      background:rgba(13,13,20,.9);backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border);
    }
    .nav-logo{font-family:'Pacifico',cursive;font-size:1.3rem;color:var(--pink)}
    .nav-back{font-size:.85rem;font-weight:700;color:var(--muted);transition:color .2s}
    .nav-back:hover{color:var(--pink)}

    /* Main */
    .main{padding:90px 20px 40px;max-width:560px;margin:0 auto}

    .page-title{font-family:'Pacifico',cursive;font-size:1.8rem;color:var(--text);margin-bottom:6px}
    .page-sub{font-size:.9rem;color:var(--muted);font-weight:600;margin-bottom:32px}

    /* Search box */
    .search-box{
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--rl);padding:24px;margin-bottom:24px;
    }
    .search-label{font-size:.75rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:block}
    .search-row{display:flex;gap:10px}
    .search-input{
      flex:1;padding:12px 16px;border-radius:var(--r);
      border:1px solid var(--border);background:var(--surface2);
      color:var(--text);font-family:'Nunito',sans-serif;
      font-size:.95rem;font-weight:700;outline:none;
      transition:border-color .2s;letter-spacing:.1em;text-transform:uppercase;
    }
    .search-input:focus{border-color:var(--pink-mid)}
    .search-input::placeholder{text-transform:none;letter-spacing:normal;font-weight:600;color:var(--muted)}
    .search-btn{
      padding:12px 22px;border-radius:var(--r);border:none;
      background:var(--pink-mid);color:white;
      font-weight:800;font-size:.9rem;
      transition:opacity .2s;white-space:nowrap;
      box-shadow:0 0 16px var(--pink-glow);
    }
    .search-btn:hover{opacity:.88}

    /* Result */
    #result{display:none}

    .order-info{
      background:var(--surface);border:1px solid var(--border-pk);
      border-radius:var(--rl);padding:20px;margin-bottom:20px;
    }
    .order-info-label{font-size:.72rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
    .order-info-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .order-info-key{font-size:.85rem;color:var(--muted);font-weight:600}
    .order-info-val{font-size:.85rem;font-weight:800;color:var(--text)}

    /* Bids section */
    .bids-title{font-size:.95rem;font-weight:900;margin-bottom:14px}
    .bid-card{
      background:var(--surface);border:2px solid var(--border);
      border-radius:var(--rl);padding:16px 18px;margin-bottom:10px;
      cursor:pointer;transition:all .2s;
    }
    .bid-card:hover{border-color:var(--pink-mid);background:var(--surface2)}
    .bid-card.selected{border-color:var(--pink-mid);background:rgba(249,168,201,.06)}
    .bid-card-name{font-weight:900;font-size:1rem;margin-bottom:3px}
    .bid-card-meta{font-size:.8rem;color:var(--muted);font-weight:600}
    .bid-check{
      width:22px;height:22px;border-radius:50%;border:2px solid var(--border);
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;transition:all .2s;font-size:.85rem;
    }
    .bid-card.selected .bid-check{background:var(--pink-mid);border-color:var(--pink-mid)}

    /* Timer countdown */
    .bid-timer{
      background:rgba(249,168,201,.07);border:1px solid var(--border-pk);
      border-radius:var(--r);padding:12px 16px;margin-bottom:16px;
      display:flex;align-items:center;gap:10px;
    }
    .bid-timer-icon{font-size:1.1rem}
    .bid-timer-text{font-size:.85rem;font-weight:700;color:var(--pink)}
    .bid-timer-countdown{font-size:1rem;font-weight:900;color:var(--pink);margin-left:auto}

    /* Confirm btn */
    .confirm-btn{
      width:100%;padding:14px;border-radius:99px;border:none;
      background:var(--pink-mid);color:white;
      font-weight:800;font-size:.95rem;margin-top:16px;
      transition:opacity .2s,transform .2s;
      box-shadow:0 4px 20px var(--pink-glow);
    }
    .confirm-btn:hover{opacity:.88;transform:translateY(-1px)}
    .confirm-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

    /* Success state */
    .success-box{
      background:rgba(61,214,140,.06);border:1px solid rgba(61,214,140,.25);
      border-radius:var(--rl);padding:28px;text-align:center;
    }
    .success-icon{font-size:2.5rem;margin-bottom:12px}
    .success-title{font-family:'Pacifico',cursive;font-size:1.4rem;color:var(--green);margin-bottom:8px}
    .success-sub{font-size:.88rem;color:var(--muted);font-weight:600;line-height:1.65}

    /* Error / empty */
    .msg-box{
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--rl);padding:32px;text-align:center;
      color:var(--muted);font-weight:600;font-size:.9rem;
    }
    .msg-icon{font-size:2rem;margin-bottom:10px}

    /* Toast */
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border-pk);border-radius:var(--r);padding:12px 20px;font-size:.87rem;font-weight:700;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.45);z-index:9999;display:none;white-space:nowrap}
    .toast.show{display:block}
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-logo">CallPay</div>
  <a href="index.html" class="nav-back">← Kembali</a>
</nav>

<div class="main">
  <div class="page-title">🔍 Cek Order</div>
  <p class="page-sub">Masukkan kode order yang kamu dapat setelah konfirmasi via WhatsApp untuk melihat talent yang available.</p>

  <div class="search-box">
    <label class="search-label">Kode Order</label>
    <div class="search-row">
      <input type="text" id="order-code" class="search-input" placeholder="Contoh: ORD-1234ABCD" maxlength="20">
      <button class="search-btn" onclick="cekOrder()">Cek</button>
    </div>
  </div>

  <div id="result"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore,
         collection, query,
         where, getDocs,
         doc, updateDoc,
         onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const FIREBASE_CONFIG = {
  apiKey           : "AIzaSyBLPe_yx28LyefI856Ysxz3YEPnwA0ENFU",
  authDomain       : "callpay-28a28.firebaseapp.com",
  projectId        : "callpay-28a28",
  storageBucket    : "callpay-28a28.firebasestorage.app",
  messagingSenderId: "44722427776",
  appId            : "1:44722427776:web:29d1a297746cd83d685365",
};

const app = initializeApp(FIREBASE_CONFIG);
const db  = getFirestore(app);

const DUR_LABEL = {30:'30 menit',60:'60 menit',90:'90 menit',120:'2 jam',180:'3 jam'};
const BID_MINUTES = 5;

let currentOrder  = null;
let selectedBid   = null;
let unsubOrder    = null;
let timerInterval = null;

window.cekOrder = async function() {
  const raw  = document.getElementById('order-code').value.trim().toUpperCase();
  const code = raw.startsWith('ORD-') ? raw : 'ORD-' + raw;
  const res  = document.getElementById('result');

  if (!raw) { toast('Masukkan kode order dulu!'); return; }

  res.style.display = 'block';
  res.innerHTML = `<div class="msg-box"><div class="msg-icon">⏳</div>Mencari order...</div>`;

  try {
    // Search by id field
    const q    = query(collection(db, 'orders'), where('id', '==', code));
    const snap = await getDocs(q);

    if (snap.empty) {
      res.innerHTML = `<div class="msg-box"><div class="msg-icon">❌</div>Kode order tidak ditemukan.<br>Pastikan kode sudah benar.</div>`;
      return;
    }

    const orderDoc = snap.docs[0];
    currentOrder   = { _docId: orderDoc.id, ...orderDoc.data() };

    // If already confirmed
    if (currentOrder.confirmedTalent) {
      renderSuccess(currentOrder);
      return;
    }

    // Listen realtime
    if (unsubOrder) unsubOrder();
    unsubOrder = onSnapshot(doc(db, 'orders', orderDoc.id), snap => {
      if (!snap.exists()) return;
      currentOrder = { _docId: snap.id, ...snap.data() };
      if (currentOrder.confirmedTalent) {
        renderSuccess(currentOrder);
      } else {
        renderOrderResult(currentOrder);
      }
    });

  } catch(e) {
    console.error(e);
    res.innerHTML = `<div class="msg-box"><div class="msg-icon">⚠️</div>Gagal terhubung. Coba lagi.</div>`;
  }
};

function renderOrderResult(order) {
  const bids    = order.bids || [];
  const created = order.createdAt?.toDate ? order.createdAt.toDate().getTime() : new Date(order.date).getTime();
  const deadline= created + BID_MINUTES * 60 * 1000;
  const now     = Date.now();
  const timeLeft= Math.max(0, Math.floor((deadline - now) / 1000));
  const expired = timeLeft <= 0;

  const res = document.getElementById('result');

  res.innerHTML = `
    <!-- Order info -->
    <div class="order-info">
      <div class="order-info-label">📋 Detail Order</div>
      <div class="order-info-row">
        <span class="order-info-key">Kode</span>
        <span class="order-info-val" style="font-family:monospace;color:var(--pink)">${order.id}</span>
      </div>
      <div class="order-info-row">
        <span class="order-info-key">Layanan</span>
        <span class="order-info-val">${order.service}</span>
      </div>
      <div class="order-info-row">
        <span class="order-info-key">Durasi</span>
        <span class="order-info-val">${DUR_LABEL[order.duration]||order.duration+' menit'}</span>
      </div>
      <div class="order-info-row">
        <span class="order-info-key">Harga</span>
        <span class="order-info-val" style="color:var(--pink)">Rp ${(order.price||0).toLocaleString('id-ID')}</span>
      </div>
    </div>

    <!-- Timer -->
    <div class="bid-timer">
      <span class="bid-timer-icon">⏱</span>
      <span class="bid-timer-text">${expired ? 'Waktu bid sudah habis' : 'Waktu talent untuk bid'}</span>
      <span class="bid-timer-countdown" id="cek-countdown">${expired ? '—' : formatTime(timeLeft)}</span>
    </div>

    <!-- Bids -->
    <div class="bids-title">
      🙋 Talent yang Tersedia
      ${bids.length ? `<span style="color:var(--muted);font-weight:600;font-size:.85rem">(${bids.length} talent)</span>` : ''}
    </div>

    ${bids.length ? `
      <div id="bids-list">
        ${bids.map(b => `
          <div class="bid-card" id="bid-${b.talentId}" onclick="selectBid('${b.talentId}','${b.talentName}','${b.gender||''}')">
            <div style="display:flex;align-items:center;gap:14px">
              <div style="width:44px;height:44px;border-radius:50%;background:rgba(249,168,201,.1);border:2px solid var(--border-pk);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.1rem;color:var(--pink);flex-shrink:0">
                ${b.talentName.charAt(0)}
              </div>
              <div style="flex:1">
                <div class="bid-card-name">${b.talentName}</div>
                <div class="bid-card-meta">${b.gender === 'female' ? '🌸 Wanita' : '💙 Pria'}</div>
              </div>
              <div class="bid-check" id="check-${b.talentId}"></div>
            </div>
          </div>`).join('')}
      </div>
      <button class="confirm-btn" id="confirm-talent-btn" onclick="confirmTalent()" disabled>
        Pilih Talent ini ✓
      </button>
    ` : `
      <div class="msg-box" style="padding:24px">
        <div class="msg-icon">⏳</div>
        ${expired ? 'Tidak ada talent yang bid. Hubungi admin.' : 'Menunggu talent bid... Halaman akan update otomatis.'}
      </div>
    `}
  `;

  // Start countdown
  if (timerInterval) clearInterval(timerInterval);
  if (!expired) {
    timerInterval = setInterval(() => {
      const left = Math.max(0, Math.floor((deadline - Date.now()) / 1000));
      const el   = document.getElementById('cek-countdown');
      if (el) el.textContent = left > 0 ? formatTime(left) : '—';
      if (left <= 0) clearInterval(timerInterval);
    }, 1000);
  }
}

window.selectBid = function(talentId, talentName, gender) {
  // Deselect all
  document.querySelectorAll('.bid-card').forEach(c => {
    c.classList.remove('selected');
    const ch = c.querySelector('.bid-check');
    if (ch) ch.textContent = '';
  });
  // Select this
  const card = document.getElementById('bid-' + talentId);
  const check = document.getElementById('check-' + talentId);
  if (card) card.classList.add('selected');
  if (check) check.textContent = '✓';

  selectedBid = { talentId, talentName, gender };

  const btn = document.getElementById('confirm-talent-btn');
  if (btn) {
    btn.disabled     = false;
    btn.textContent  = `✅ Pilih ${talentName}`;
  }
};

window.confirmTalent = async function() {
  if (!selectedBid || !currentOrder) return;
  const btn = document.getElementById('confirm-talent-btn');
  btn.disabled    = true;
  btn.textContent = 'Memproses...';

  try {
    await updateDoc(doc(db, 'orders', currentOrder._docId), {
      confirmedTalent    : selectedBid.talentId,
      confirmedTalentName: selectedBid.talentName,
      talentId           : selectedBid.talentId,
      talentName         : selectedBid.talentName,
      status             : 'baru',
    });
    // renderSuccess will be called by onSnapshot
  } catch(e) {
    console.error(e);
    btn.disabled    = false;
    btn.textContent = `✅ Pilih ${selectedBid.talentName}`;
    toast('Gagal konfirmasi, coba lagi');
  }
};

function renderSuccess(order) {
  if (timerInterval) clearInterval(timerInterval);
  document.getElementById('result').innerHTML = `
    <div class="order-info" style="margin-bottom:16px">
      <div class="order-info-label">📋 Detail Order</div>
      <div class="order-info-row">
        <span class="order-info-key">Kode</span>
        <span class="order-info-val" style="font-family:monospace;color:var(--pink)">${order.id}</span>
      </div>
      <div class="order-info-row">
        <span class="order-info-key">Layanan</span>
        <span class="order-info-val">${order.service}</span>
      </div>
      <div class="order-info-row">
        <span class="order-info-key">Durasi</span>
        <span class="order-info-val">${DUR_LABEL[order.duration]||order.duration+' menit'}</span>
      </div>
    </div>
    <div class="success-box">
      <div class="success-icon">🎉</div>
      <div class="success-title">Talent Sudah Dipilih!</div>
      <p class="success-sub">
        Kamu akan ditemani oleh<br>
        <strong style="color:var(--pink);font-size:1.1rem">${order.confirmedTalentName}</strong><br><br>
        Admin kami akan segera menghubungi kamu via WhatsApp untuk memulai sesi. Terima kasih! 💕
      </p>
    </div>
  `;
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Allow Enter key
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('order-code').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.cekOrder();
  });
});
</script>
</body>
</html>
